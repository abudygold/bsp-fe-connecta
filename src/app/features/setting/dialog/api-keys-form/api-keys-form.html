<lib-dialog
	[title]="
		isCreated()
			? 'API Key Created'
			: data?.row
				? 'Edit WhatsApp Unofficial Account'
				: 'Add WhatsApp Unofficial Account'
	">
	<ng-container content>
		<div class="tw:pt-5">
			@if (isCreated()) {
				<div
					class="tw:bg-amber-50 tw:rounded-md tw:p-4 tw:mb-8 tw:flex tw:items-center tw:gap-3">
					<fa-icon [icon]="faIcon.faInfoCircle" size="lg" class="tw:text-amber-700" />
					<p class="tw:text-amber-900 tw:text-sm tw:font-medium">
						Make sure to copy your token now. You will
						<span class="tw:font-bold">not</span> be able to see it again.
					</p>
				</div>

				<div class="tw:mb-6">
					<label class="tw:block tw:font-bold tw:tracking-widest tw:mb-2"> Name </label>
					<div class="tw:font-medium">{{ apiKey().name }}</div>
				</div>

				<div class="tw:mb-6">
					<label class="tw:block tw:font-bold tw:tracking-widest tw:mb-2"> Token </label>
					<div class="tw:flex tw:gap-3 tw:items-start">
						<div
							class="tw:bg-slate-50 tw:border tw:border-slate-200 tw:rounded-xl tw:p-4 tw:flex-1">
							<code
								class="tw:text-slate-600 tw:text-sm tw:break-all tw:leading-relaxed tw:font-mono">
								{{ apiKey().token }}
							</code> </div
						><button
							class="tw:flex tw:items-center tw:gap-2 tw:bg-blue-50 tw:text-blue-600 tw:px-4 tw:py-2 tw:rounded-lg tw:font-medium tw:text-sm hover:tw:bg-blue-100 tw:transition-colors">
							<fa-icon
								[icon]="faIcon.faClipboard"
								size="lg"
								class="tw:cursor-pointer"
								(click)="onClipboardClick()" />
						</button>
					</div>
				</div>

				<div>
					<label class="tw:block tw:font-bold tw:tracking-widest tw:mb-2">
						Expires
					</label>
					<div class="tw:font-medium">{{
						apiKey().expiredDate | date: 'd MMM, yyyy'
					}}</div>
				</div>
			} @else {
				<lib-formly [formConfig]="formConfig()" />
			}
		</div>
	</ng-container>
	<ng-container actions>
		@if (isCreated()) {
			<div class="tw:flex tw:justify-end tw:my-2 tw:w-full">
				<lib-button [config]="btn.close()" />
			</div>
		} @else {
			<div class="tw:flex tw:justify-between tw:my-2 tw:w-full">
				<lib-button [config]="btn.cancel()" />
				<lib-button [config]="btn.save()" />
			</div>
		}
	</ng-container>
</lib-dialog>
