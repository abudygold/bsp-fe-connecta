<lib-dialog [title]="data ? 'Edit Account' : 'Add Account'">
	<ng-container content>
		<div class="tw:pt-5">
			<lib-formly [formConfig]="formConfig()" />
		</div>
	</ng-container>
	<ng-container actions>
		<div class="tw:flex tw:justify-between tw:my-4 tw:w-full">
			<lib-button [config]="btn.cancel()" />
			<lib-button [config]="btn.save()" />
		</div>
	</ng-container>
</lib-dialog>
