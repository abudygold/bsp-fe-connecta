<lib-dialog
	[title]="data?.row ? 'Edit WhatsApp Unofficial Account' : 'Add WhatsApp Unofficial Account'">
	<ng-container content>
		<div class="tw:pt-5">
			<lib-formly [formConfig]="formConfig()" />
		</div>
	</ng-container>
	<ng-container actions>
		<div class="tw:flex tw:justify-between tw:my-2 tw:w-full">
			<lib-button [config]="btn.cancel()" />
			<lib-button [config]="btn.save()" />
		</div>
	</ng-container>
</lib-dialog>
