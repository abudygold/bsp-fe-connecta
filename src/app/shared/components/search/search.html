<lib-textbox
	class="no-hint"
	[field]="{
		key: 'searchValue',
		type: 'textbox',
		control: $any(form.searchValue),
		config: {
			label: '',
			placeholder: placeholder(),
		},
		onInput: onSearch.bind(this),
	}">
	<ng-template #matSuffixRef>
		<fa-icon [icon]="faIcon.faSearch" class="tw:mr-3" />
	</ng-template>
</lib-textbox>
